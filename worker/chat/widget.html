<!--
  M2W Chat Widget v4.2
  Closed : pill glassmorphism · white glow · trilingual cycling
  Open   : clean header · PT · EN · ES badge · creative-card input
-->
<style>
/* ── Launcher / Pill ────────────────────────────────────────────────── */
#m2w-launcher{
  position:fixed;bottom:24px;right:24px;z-index:9999;
  display:flex;flex-direction:column;align-items:flex-end;gap:0;
}

#m2w-pill{
  display:flex;align-items:center;justify-content:center;
  padding:0 28px;height:58px;border-radius:29px;
  /* glassmorphism */
  background:rgba(8,8,8,.76);
  backdrop-filter:blur(22px) saturate(180%);
  -webkit-backdrop-filter:blur(22px) saturate(180%);
  border:1px solid rgba(255,255,255,.28);
  cursor:pointer;
  /* layered shadow: drop + ambient glow + inner top highlight */
  box-shadow:
    0 16px 52px rgba(0,0,0,.9),
    0 0 0 1px rgba(255,255,255,.06),
    0 0 30px rgba(255,255,255,.09),
    inset 0 1px 0 rgba(255,255,255,.15);
  animation:pill-ring 3.6s ease-in-out infinite;
  transition:transform .22s,box-shadow .22s,border-color .22s;
  white-space:nowrap;overflow:visible;
}
#m2w-pill:hover{
  border-color:rgba(255,255,255,.56);
  animation:none;
  transform:translateY(-2px) scale(1.025);
  box-shadow:
    0 22px 60px rgba(0,0,0,.92),
    0 0 0 2px rgba(255,255,255,.1),
    0 0 48px rgba(255,255,255,.22),
    inset 0 1px 0 rgba(255,255,255,.24);
}
#m2w-pill:active{transform:translateY(0) scale(.98);}

@keyframes pill-ring{
  0%,100%{
    border-color:rgba(255,255,255,.22);
    box-shadow:
      0 16px 52px rgba(0,0,0,.9),
      0 0 0 0 rgba(255,255,255,.32),
      0 0 24px rgba(255,255,255,.07),
      inset 0 1px 0 rgba(255,255,255,.13);
  }
  50%{
    border-color:rgba(255,255,255,.48);
    box-shadow:
      0 16px 52px rgba(0,0,0,.9),
      0 0 0 14px rgba(255,255,255,0),
      0 0 42px rgba(255,255,255,.17),
      inset 0 1px 0 rgba(255,255,255,.22);
  }
}

/* Pill text — trilingual cycling */
.pill-text{
  font-family:'Courier New',monospace;
  font-size:12px;letter-spacing:.7px;
  color:rgba(255,255,255,.9);
  text-shadow:0 0 20px rgba(255,255,255,.25);
  display:inline-block;
  transition:opacity .28s ease,transform .28s ease;
}

/* ── Chat Box ──────────────────────────────────────────────────────── */
#m2w-chat-box{
  position:fixed;bottom:24px;right:24px;z-index:9998;
  width:360px;max-width:calc(100vw - 32px);
  background:#0a0a0a;
  border:1px solid rgba(255,255,255,.12);
  border-top:2px solid rgba(255,255,255,.42);
  border-radius:16px;overflow:hidden;
  box-shadow:
    0 32px 80px rgba(0,0,0,.92),
    0 0 18px rgba(255,255,255,.06),
    0 0 0 1px rgba(255,255,255,.04);
  display:none;flex-direction:column;max-height:580px;
  animation:chatIn .26s cubic-bezier(.22,1,.36,1);
}
@keyframes chatIn{
  from{opacity:0;transform:translateY(14px) scale(.965);}
  to  {opacity:1;transform:none;}
}

/* Header */
#m2w-chat-head{
  padding:13px 14px 11px;
  display:flex;align-items:center;gap:0;
  background:#0a0a0a;flex-shrink:0;
  border-bottom:1px solid #141414;
}
.chat-head-info{flex:1;min-width:0;}

/* Brand watermark "by M2W logo" */
.chat-head-brand{
  display:flex;align-items:center;gap:3px;
  margin-right:10px;flex-shrink:0;opacity:.7;
  transition:opacity .2s;
}
.chat-head-brand:hover{opacity:1;}
.brand-by{
  font-family:'Courier New',monospace;font-size:7px;
  color:rgba(255,255,255,.4);letter-spacing:.5px;
  text-transform:lowercase;line-height:1;
}
.brand-logo{
  height:13px;width:auto;display:block;
  filter:brightness(0) invert(1);
}
.chat-head-name{
  margin:0 0 3px;font-size:13px;font-weight:500;
  color:#f0f0f0;letter-spacing:.01em;line-height:1.2;
}
.chat-head-status{
  margin:0;font-size:8px;color:#505050;
  font-family:'Courier New',monospace;
  letter-spacing:2.5px;text-transform:uppercase;
  display:flex;align-items:center;gap:0;
}
/* Discrete trilingual indicator */
.trilang-badge{
  font-family:'Courier New',monospace;font-size:7px;
  color:rgba(255,255,255,.16);letter-spacing:1.8px;
  margin-left:8px;
}
.chat-status-dot{
  display:inline-block;width:5px;height:5px;border-radius:50%;
  background:#4ade80;margin-right:5px;flex-shrink:0;
  animation:blink-dot 3s ease-in-out infinite;
}
@keyframes blink-dot{0%,100%{opacity:1;}50%{opacity:.3;}}
.chat-close-btn{
  width:28px;height:28px;border-radius:7px;flex-shrink:0;
  border:1px solid #1e1e1e;background:transparent;
  color:#464646;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;line-height:1;
  transition:border-color .2s,color .2s;
}
.chat-close-btn:hover{border-color:#383838;color:#c0c0c0;}

/* Messages */
#m2w-chat-msgs{
  flex:1;overflow-y:auto;padding:14px 12px 10px;
  display:flex;flex-direction:column;gap:9px;
  scrollbar-width:thin;scrollbar-color:#202020 transparent;
}
#m2w-chat-msgs::-webkit-scrollbar{width:2px;}
#m2w-chat-msgs::-webkit-scrollbar-thumb{background:#222;border-radius:99px;}

.msg{
  max-width:88%;font-size:13px;line-height:1.72;
  padding:9px 13px;border-radius:12px;word-break:break-word;
}
.msg-bot{
  background:#111;border:1px solid #1c1c1c;
  color:#c2c2c2;border-radius:3px 12px 12px 12px;align-self:flex-start;
}
.msg-bot strong{color:#e0d0b8;font-weight:600;}
.msg-user{
  background:#161005;border:1px solid #2c1e08;
  color:#e0cf9e;border-radius:12px 3px 12px 12px;align-self:flex-end;
}
.msg-typing{
  background:#111;border:1px solid #1c1c1c;
  border-radius:3px 12px 12px 12px;align-self:flex-start;
  display:flex;gap:4px;align-items:center;padding:11px 15px;
}
.dot-pulse{width:5px;height:5px;border-radius:50%;background:#C8A97E;animation:dp 1.2s ease-in-out infinite;}
.dot-pulse:nth-child(2){animation-delay:.18s;}
.dot-pulse:nth-child(3){animation-delay:.36s;}
@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.75);}40%{opacity:1;transform:scale(1);}}

/* Topic tags */
.chat-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.chat-tag{
  font-size:9px;font-family:'Courier New',monospace;
  letter-spacing:1.5px;text-transform:uppercase;
  padding:5px 10px;border:1px solid #1d1d1d;border-radius:4px;
  color:#565656;background:transparent;cursor:pointer;
  transition:border-color .2s,color .2s,background .2s;white-space:nowrap;
}
.chat-tag:hover{border-color:rgba(200,169,126,.42);color:#C8A97E;background:rgba(200,169,126,.04);}

/* Input (creative-card style) */
#m2w-chat-form{
  padding:10px 12px 12px;background:#070707;
  border-top:1px solid #141414;flex-shrink:0;
}
.chat-form-inner{
  display:flex;flex-direction:column;
  background:#111;border:1px solid #1d1d1d;
  border-radius:12px;overflow:hidden;
  transition:border-color .22s;
}
.chat-form-inner:focus-within{border-color:rgba(200,169,126,.32);}
#m2w-chat-input{
  width:100%;background:transparent;border:none;
  color:#e8e8e8;font-size:13px;
  padding:11px 13px 5px;outline:none;resize:none;
  font-family:inherit;line-height:1.58;
  max-height:88px;overflow-y:auto;box-sizing:border-box;
}
#m2w-chat-input::placeholder{color:#323232;}
.chat-form-footer{
  display:flex;justify-content:flex-end;align-items:center;
  padding:5px 10px 8px;
}
#m2w-chat-send{
  width:32px;height:32px;border-radius:8px;border:none;
  background:#C8A97E;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(200,169,126,.22);
  transition:opacity .2s,transform .12s;
}
#m2w-chat-send:hover{opacity:.84;transform:translateY(-1px);}
#m2w-chat-send:active{transform:scale(.93);}
#m2w-chat-send:disabled{opacity:.26;cursor:not-allowed;transform:none;}
#m2w-chat-send svg{width:14px;height:14px;}

/* Calendly CTA button */
.calendly-btn{
  display:inline-flex;align-items:center;gap:7px;
  font-family:'Courier New',monospace;font-size:9.5px;
  letter-spacing:1.2px;text-transform:uppercase;
  padding:9px 16px;border-radius:7px;
  border:1px solid rgba(200,169,126,.42);
  color:#C8A97E;background:transparent;
  cursor:pointer;margin-top:6px;
  transition:background .18s,border-color .18s;
}
.calendly-btn:hover{
  background:rgba(200,169,126,.08);
  border-color:rgba(200,169,126,.72);
}

/* Mobile */
@media(max-width:480px){
  #m2w-chat-box{right:8px;bottom:8px;width:calc(100vw - 16px);max-height:78vh;}
  #m2w-launcher{right:12px;bottom:16px;}
  #m2w-pill{height:52px;padding:0 22px;}
  .pill-text{font-size:11px;}
}
</style>

<!-- LAUNCHER — pill button -->
<div id="m2w-launcher">
  <button id="m2w-pill" aria-label="Como podemos ajudar? Chat M2W" aria-expanded="false">
    <span class="pill-text" id="pill-text">Como podemos ajudar?</span>
  </button>
</div>

<!-- CHAT BOX -->
<div id="m2w-chat-box" role="dialog" aria-label="Chat Concierge M2W">

  <!-- Header -->
  <div id="m2w-chat-head">
    <div class="chat-head-info">
      <p class="chat-head-name">Concierge M2W</p>
      <p class="chat-head-status">
        <span class="chat-status-dot"></span>Online
        <span class="trilang-badge">PT&nbsp;&middot;&nbsp;EN&nbsp;&middot;&nbsp;ES</span>
      </p>
    </div>
    <div class="chat-head-brand">
      <span class="brand-by">by</span>
      <img class="brand-logo" src="logo-white.png" alt="M2W">
    </div>
    <button class="chat-close-btn" id="m2w-chat-close" aria-label="Fechar">&#x2715;</button>
  </div>

  <!-- Messages -->
  <div id="m2w-chat-msgs"></div>

  <!-- Input -->
  <div id="m2w-chat-form">
    <div class="chat-form-inner">
      <textarea id="m2w-chat-input"
        placeholder="Pergunte sobre nossos servi&ccedil;os&hellip;"
        rows="1" maxlength="800"></textarea>
      <div class="chat-form-footer">
        <button id="m2w-chat-send" aria-label="Enviar">
          <svg viewBox="0 0 24 24" fill="none"
               stroke="#080808" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  var WORKER = 'https://m2w-chat.m2w-ai.workers.dev';
  var pill   = document.getElementById('m2w-pill');
  var box    = document.getElementById('m2w-chat-box');
  var msgs   = document.getElementById('m2w-chat-msgs');
  var input  = document.getElementById('m2w-chat-input');
  var send   = document.getElementById('m2w-chat-send');
  var history = [];
  var open    = false;
  var sending = false;

  // \u2500\u2500 Trilingual pill text cycling \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  var pillTexts = [
    'Como podemos ajudar?',
    'How can we help?',
    '\u00bfC\u00f3mo podemos ayudar?'
  ];
  var pillIdx    = 0;
  var pillTextEl = document.getElementById('pill-text');

  setInterval(function() {
    pillTextEl.style.opacity   = '0';
    pillTextEl.style.transform = 'translateY(-3px)';
    setTimeout(function() {
      pillIdx = (pillIdx + 1) % pillTexts.length;
      pillTextEl.textContent     = pillTexts[pillIdx];
      pillTextEl.style.opacity   = '1';
      pillTextEl.style.transform = 'translateY(0)';
    }, 300);
  }, 3200);

  // \u2500\u2500 Strings PT-BR \u2014 Unicode escapes garantem encoding correto \u2500
  var WELCOME = 'Ol\u00e1! Sou a Mia, concierge da M2W AI Solutions. Posso te ajudar com d\u00favidas sobre influencers digitais de IA, pre\u00e7os, servi\u00e7os ou qualquer coisa relacionada. Por onde quer come\u00e7ar?';
  var TAGS = [
    'Ver pre\u00e7os',
    'TikTok Shop',
    'Influencer exclusivo',
    'Como funciona?',
    'Garantia de ROI',
    'Agendar com Silvio'
  ];

  // \u2500\u2500 Calendly integration \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  var CALENDLY_URL = 'https://calendly.com/silviofilhosf/nova-reuniao';

  function openCalendly() {
    if (window.Calendly) {
      Calendly.initPopupWidget({ url: CALENDLY_URL });
    } else {
      // lazy-load Calendly script + CSS on first use
      var link = document.createElement('link');
      link.rel  = 'stylesheet';
      link.href = 'https://assets.calendly.com/assets/external/widget.css';
      document.head.appendChild(link);
      var s = document.createElement('script');
      s.src = 'https://assets.calendly.com/assets/external/widget.js';
      s.onload = function() {
        Calendly.initPopupWidget({ url: CALENDLY_URL });
      };
      document.head.appendChild(s);
    }
  }

  function addCalendlyBtn() {
    var d = document.createElement('div');
    d.className = 'msg msg-bot';
    var btn = document.createElement('button');
    btn.className = 'calendly-btn';
    btn.innerHTML = '&#128197;&nbsp;Agendar 15 min &mdash; Silvio';
    btn.onclick = openCalendly;
    d.appendChild(btn);
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  // Renderiza markdown simples nas mensagens do bot
  function renderBot(text) {
    var s = text
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;');
    s = s.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
    s = s.replace(/\*([^*\n]+)\*/g,'<em>$1</em>');
    s = s.replace(/\n/g,'<br>');
    return s;
  }

  function addMsg(content, role) {
    var d = document.createElement('div');
    d.className = 'msg msg-' + (role === 'user' ? 'user' : 'bot');
    if (role === 'user') { d.textContent = content; }
    else                 { d.innerHTML   = renderBot(content); }
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
    return d;
  }

  function showTyping() {
    var d = document.createElement('div');
    d.className = 'msg-typing'; d.id = 'typing';
    d.innerHTML = '<div class="dot-pulse"></div><div class="dot-pulse"></div><div class="dot-pulse"></div>';
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }
  function removeTyping() { var t = document.getElementById('typing'); if (t) t.remove(); }

  function addTags() {
    var row = document.createElement('div');
    row.className = 'chat-tags';
    TAGS.forEach(function(label) {
      var b = document.createElement('button');
      b.className = 'chat-tag'; b.textContent = label;
      b.onclick = function() {
        row.remove();
        if (label === 'Agendar com Silvio') { openCalendly(); }
        else { submitMsg(label); }
      };
      row.appendChild(b);
    });
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function setOpen(state) {
    open = state;
    box.style.display   = open ? 'flex' : 'none';
    pill.style.display  = open ? 'none' : 'flex';
    pill.setAttribute('aria-expanded', String(open));
    if (open && history.length === 0) {
      addMsg(WELCOME, 'bot');
      history.push({ role: 'assistant', content: WELCOME });
      setTimeout(addTags, 280);
      setTimeout(function() { input.focus(); }, 380);
    }
  }

  function submitMsg(text) {
    text = (text || input.value).trim();
    if (!text || sending) return;
    input.value = ''; input.style.height = 'auto';
    sending = true; send.disabled = true;
    addMsg(text, 'user');
    history.push({ role: 'user', content: text });
    showTyping();

    fetch(WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      removeTyping();
      var reply = data.reply || 'Desculpe, tive um problema. Tente novamente.';
      addMsg(reply, 'bot');
      history.push({ role: 'assistant', content: reply });
      if (data.leadCaptured) {
        setTimeout(function() {
          var n = addMsg('\u2713 Informa\u00e7\u00f5es registradas. O Silvio entra em contato em menos de 24\u00a0h.', 'bot');
          n.style.borderColor = '#1b3210';
          n.style.color = '#86efac';
        }, 500);
        setTimeout(addCalendlyBtn, 1100);
      }
      if (data.calendly) {
        setTimeout(addCalendlyBtn, 600);
      }
      sending = false; send.disabled = false; input.focus();
    })
    .catch(function() {
      removeTyping();
      addMsg('Problema de conex\u00e3o. Tente novamente em instantes.', 'bot');
      sending = false; send.disabled = false;
    });
  }

  pill.addEventListener('click', function() { setOpen(true); });
  document.getElementById('m2w-chat-close').addEventListener('click', function() { setOpen(false); });
  send.addEventListener('click', function() { submitMsg(); });
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitMsg(); }
  });
  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 88) + 'px';
  });
})();
</script>
