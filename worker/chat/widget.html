<!--
  M2W Chat Widget v5.0 — Liquid Glass
  Mia Park · Consultora M2W AI Solutions
  Design: transparent liquid glass · image upload · trilingual
-->
<style>
/* ── Launcher / Pill ──────────────────────────────────────────────────────── */
#m2w-launcher{
  position:fixed;bottom:24px;right:24px;z-index:9999;
  display:flex;flex-direction:column;align-items:flex-end;
}
#m2w-pill{
  display:flex;align-items:center;justify-content:center;gap:9px;
  padding:0 22px;height:52px;border-radius:26px;
  background:rgba(8,8,8,.82);
  backdrop-filter:blur(22px) saturate(180%);
  -webkit-backdrop-filter:blur(22px) saturate(180%);
  border:1px solid rgba(139,92,246,.35);
  cursor:pointer;
  box-shadow:
    0 16px 52px rgba(0,0,0,.9),
    0 0 0 1px rgba(139,92,246,.08),
    0 0 32px rgba(139,92,246,.14),
    inset 0 1px 0 rgba(255,255,255,.12);
  animation:pill-ring 3.8s ease-in-out infinite;
  transition:transform .22s,box-shadow .22s,border-color .22s;
  white-space:nowrap;
}
#m2w-pill:hover{
  border-color:rgba(139,92,246,.65);animation:none;
  transform:translateY(-2px) scale(1.025);
  box-shadow:
    0 22px 60px rgba(0,0,0,.92),
    0 0 0 2px rgba(139,92,246,.15),
    0 0 52px rgba(139,92,246,.28),
    inset 0 1px 0 rgba(255,255,255,.2);
}
#m2w-pill:active{transform:translateY(0) scale(.98);}
@keyframes pill-ring{
  0%,100%{
    border-color:rgba(139,92,246,.28);
    box-shadow:0 16px 52px rgba(0,0,0,.9),0 0 0 0 rgba(139,92,246,.3),0 0 24px rgba(139,92,246,.1),inset 0 1px 0 rgba(255,255,255,.1);
  }
  50%{
    border-color:rgba(139,92,246,.52);
    box-shadow:0 16px 52px rgba(0,0,0,.9),0 0 0 10px rgba(139,92,246,0),0 0 44px rgba(139,92,246,.2),inset 0 1px 0 rgba(255,255,255,.17);
  }
}
.pill-online-dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
  background:#4ade80;
  box-shadow:0 0 0 0 rgba(74,222,128,.6);
  animation:online-pulse 2.6s ease-in-out infinite;
}
@keyframes online-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,.55);}
  50%{box-shadow:0 0 0 5px rgba(74,222,128,0);}
}
.pill-online-label{
  font-size:11.5px;font-weight:500;letter-spacing:.4px;
  color:rgba(255,255,255,.88);
  text-shadow:0 0 18px rgba(139,92,246,.3);
  font-family:inherit;
}
.pill-sep{
  width:1px;height:14px;background:rgba(255,255,255,.14);flex-shrink:0;
}
.pill-text{
  font-size:11px;letter-spacing:.55px;color:rgba(255,255,255,.62);
  transition:opacity .28s ease,transform .28s ease;
  font-family:inherit;
}

/* ── Chat Box — Liquid Glass ─────────────────────────────────────────────── */
#m2w-chat-box{
  position:fixed;bottom:96px;right:24px;
  width:384px;max-height:calc(100vh - 120px);min-height:520px;
  display:none;flex-direction:column;z-index:9998;
  border-radius:24px;overflow:hidden;

  /* liquid glass core */
  background:rgba(6,6,14,0.52);
  backdrop-filter:blur(52px) saturate(190%) brightness(1.08);
  -webkit-backdrop-filter:blur(52px) saturate(190%) brightness(1.08);
  border:1px solid rgba(255,255,255,0.11);
  box-shadow:
    0 52px 120px rgba(0,0,0,0.76),
    0 0 0 1px rgba(255,255,255,0.04),
    0 0 0 2px rgba(255,255,255,0.08),
    0 0 28px rgba(255,255,255,0.12),
    inset 0 1px 0 rgba(255,255,255,0.14),
    inset 0 -1px 0 rgba(255,255,255,0.04);
}

/* ── Lang strip ─────────────────────────────────────────────────────────── */
.lang-strip{
  display:flex;align-items:center;justify-content:center;gap:5px;
  padding:5px 0 4px;
  background:rgba(139,92,246,0.04);
  border-bottom:1px solid rgba(139,92,246,0.08);
  flex-shrink:0;
}
.lang-strip-flag{font-size:12px;line-height:1;opacity:.7;}
.lang-strip-dot{
  width:2px;height:2px;border-radius:50%;
  background:rgba(255,255,255,.15);flex-shrink:0;
}
.lang-strip-label{
  font-family:'Courier New',monospace;font-size:6.5px;
  color:rgba(255,255,255,.2);letter-spacing:2px;text-transform:uppercase;
}

/* ── Header ──────────────────────────────────────────────────────────────── */
#m2w-chat-head{
  display:flex;align-items:center;gap:11px;
  padding:15px 18px 15px 16px;
  background:rgba(255,255,255,0.04);
  border-bottom:1px solid rgba(255,255,255,0.07);
  flex-shrink:0;
}
.chat-head-avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  border:1px solid rgba(200,169,126,0.32);
  overflow:hidden;
  box-shadow:0 0 20px rgba(200,169,126,0.16);
}
.chat-head-avatar img{
  width:100%;height:100%;object-fit:cover;object-position:center top;
  display:block;
}
.chat-head-info{flex:1;min-width:0;}
.chat-head-name{
  font-size:13px;font-weight:500;color:rgba(255,255,255,.88);
  letter-spacing:.01em;line-height:1.25;margin-bottom:3px;
}
.chat-head-status{
  font-size:8px;color:rgba(255,255,255,.28);
  font-family:'Courier New',monospace;
  letter-spacing:2.2px;text-transform:uppercase;
  display:flex;align-items:center;
}
.trilang-badge{
  font-family:'Courier New',monospace;font-size:7px;
  color:rgba(255,255,255,.14);letter-spacing:1.8px;margin-left:8px;
}
.chat-status-dot{
  display:inline-block;width:5px;height:5px;border-radius:50%;
  background:#4ade80;margin-right:5px;flex-shrink:0;
  animation:blink-dot 3s ease-in-out infinite;
}
@keyframes blink-dot{0%,100%{opacity:1;}50%{opacity:.3;}}
.chat-head-brand{
  display:flex;align-items:center;gap:3px;
  margin-right:8px;flex-shrink:0;opacity:.55;transition:opacity .2s;
}
.chat-head-brand:hover{opacity:1;}
.brand-by{font-family:'Courier New',monospace;font-size:7px;color:rgba(255,255,255,.3);letter-spacing:.5px;text-transform:lowercase;line-height:1;}
.brand-logo{height:13px;width:auto;display:block;filter:brightness(0) invert(1);}
.chat-close-btn{
  width:28px;height:28px;border-radius:8px;flex-shrink:0;
  border:1px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.03);
  color:rgba(255,255,255,.3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;line-height:1;
  transition:border-color .2s,color .2s,background .2s;
}
.chat-close-btn:hover{border-color:rgba(255,255,255,.16);color:rgba(255,255,255,.7);background:rgba(255,255,255,.06);}

/* ── Messages ────────────────────────────────────────────────────────────── */
#m2w-chat-msgs{
  flex:1;overflow-y:auto;padding:16px 14px 10px;
  display:flex;flex-direction:column;gap:10px;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.07) transparent;
}
#m2w-chat-msgs::-webkit-scrollbar{width:2px;}
#m2w-chat-msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);border-radius:99px;}

.msg{max-width:88%;font-size:13px;line-height:1.78;word-break:break-word;}
.msg-bot{
  padding:11px 14px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:4px 16px 16px 16px;
  color:#d0d0d0;align-self:flex-start;
}
.msg-bot strong{color:#e8dab4;font-weight:600;}
.msg-bot em{color:rgba(255,255,255,.5);font-style:italic;}
.msg-bot ul{padding-left:17px;margin:6px 0;}
.msg-bot li{margin-bottom:3px;color:#c8c8c8;}
.msg-user{
  padding:11px 14px;
  background:rgba(200,169,126,0.12);
  border:1px solid rgba(200,169,126,0.2);
  border-radius:16px 4px 16px 16px;
  color:#ecddb8;align-self:flex-end;
}

/* Image messages */
.msg-img-wrap{
  padding:6px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:4px 16px 16px 16px;
  align-self:flex-start;
}
.msg-img-wrap.user-img{
  border-radius:16px 4px 16px 16px;
  background:rgba(200,169,126,0.09);
  border-color:rgba(200,169,126,0.17);
  align-self:flex-end;
}
.chat-img-thumb{
  max-width:220px;max-height:170px;
  border-radius:10px;object-fit:cover;display:block;
  border:1px solid rgba(255,255,255,0.07);
}

/* Typing */
.msg-typing{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:4px 16px 16px 16px;align-self:flex-start;
  display:flex;gap:4px;align-items:center;padding:12px 16px;
}
.dot-pulse{width:5px;height:5px;border-radius:50%;background:#C8A97E;animation:dp 1.2s ease-in-out infinite;}
.dot-pulse:nth-child(2){animation-delay:.18s;}
.dot-pulse:nth-child(3){animation-delay:.36s;}
@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.75);}40%{opacity:1;transform:scale(1);}}

/* ── Quick Tags ──────────────────────────────────────────────────────────── */
.chat-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.chat-tag{
  font-size:9.5px;font-family:'Courier New',monospace;
  letter-spacing:1.3px;text-transform:uppercase;
  padding:6px 13px;border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;color:rgba(255,255,255,.42);
  background:rgba(255,255,255,0.04);
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.chat-tag:hover{border-color:rgba(200,169,126,.48);color:#C8A97E;background:rgba(200,169,126,0.08);}

/* ── Calendly Embed ──────────────────────────────────────────────────────── */
.cal-embed-wrap{
  width:100%;margin-top:4px;
  border-radius:14px;overflow:hidden;
  border:1px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.02);
}
.cal-embed-label{
  font-family:'Courier New',monospace;font-size:7.5px;
  color:rgba(255,255,255,.22);letter-spacing:2px;text-transform:uppercase;
  padding:8px 12px 0;display:block;
}
.cal-embed-inner{
  min-width:316px;height:560px;
}

/* ── Input Area ──────────────────────────────────────────────────────────── */
#m2w-chat-form{
  padding:10px 14px 14px;
  background:rgba(255,255,255,0.02);
  border-top:1px solid rgba(255,255,255,0.06);
  flex-shrink:0;
}
#m2w-img-preview-strip{
  display:none;align-items:center;gap:8px;padding:0 2px 8px;
}
.preview-img-thumb{
  width:46px;height:46px;border-radius:8px;object-fit:cover;
  border:1px solid rgba(200,169,126,0.3);
}
.preview-remove{
  width:20px;height:20px;border-radius:50%;
  background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,.45);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;line-height:1;transition:background .15s;
}
.preview-remove:hover{background:rgba(200,60,60,0.4);}
.chat-form-inner{
  display:flex;flex-direction:column;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;overflow:hidden;
  transition:border-color .22s;
}
.chat-form-inner:focus-within{border-color:rgba(200,169,126,0.32);}
#m2w-chat-input{
  width:100%;background:transparent;border:none;
  color:rgba(255,255,255,.88);font-size:13px;
  padding:12px 14px 6px;outline:none;resize:none;
  font-family:inherit;line-height:1.58;
  max-height:88px;overflow-y:auto;box-sizing:border-box;
}
#m2w-chat-input::placeholder{color:rgba(255,255,255,.2);}
.chat-form-footer{
  display:flex;justify-content:space-between;
  align-items:center;padding:4px 10px 8px;
}
.chat-attach-btn{
  width:28px;height:28px;border-radius:8px;
  border:1px solid rgba(255,255,255,0.07);background:transparent;
  color:rgba(255,255,255,.22);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:color .2s,border-color .2s;
}
.chat-attach-btn:hover{color:rgba(200,169,126,.7);border-color:rgba(200,169,126,.28);}
.chat-attach-btn svg{width:14px;height:14px;}
#m2w-chat-send{
  width:30px;height:30px;border-radius:10px;border:none;
  background:rgba(200,169,126,0.88);cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(200,169,126,.22);
  transition:opacity .2s,transform .12s;
}
#m2w-chat-send:hover{opacity:.84;transform:translateY(-1px);}
#m2w-chat-send:active{transform:scale(.93);}
#m2w-chat-send:disabled{opacity:.22;cursor:not-allowed;transform:none;}
#m2w-chat-send svg{width:13px;height:13px;}

/* ── Mobile ──────────────────────────────────────────────────────────────── */
@media(max-width:480px){
  #m2w-chat-box{right:8px;bottom:8px;width:calc(100vw - 16px);max-height:78vh;}
  #m2w-launcher{right:12px;bottom:16px;}
  #m2w-pill{height:52px;padding:0 22px;}
  .pill-text{font-size:11px;}
}
</style>

<!-- LAUNCHER -->

<script>
(function(){
  var WORKER = 'https://m2w-chat.m2w-ai.workers.dev';
  var pill          = document.getElementById('m2w-pill');
  var box           = document.getElementById('m2w-chat-box');
  var msgs          = document.getElementById('m2w-chat-msgs');
  var input         = document.getElementById('m2w-chat-input');
  var send          = document.getElementById('m2w-chat-send');
  var attachBtn     = document.getElementById('m2w-attach-btn');
  var fileInput     = document.getElementById('m2w-file-input');
  var previewStrip  = document.getElementById('m2w-img-preview-strip');
  var previewThumb  = document.getElementById('preview-img-thumb');
  var previewRemove = document.getElementById('preview-remove-btn');

  var history    = [];
  var openState  = false;
  var sending    = false;
  var pendingImg = null; // {dataUrl, mimeType}

  // ── Trilingual pill cycling ──────────────────────────────────
  var pillTexts  = ['Como podemos ajudar?','How can we help?','¿Cómo podemos ayudar?'];
  var pillIdx    = 0;
  var pillTextEl = document.getElementById('pill-text');
  setInterval(function(){
    pillTextEl.style.opacity   = '0';
    pillTextEl.style.transform = 'translateY(-3px)';
    setTimeout(function(){
      pillIdx = (pillIdx + 1) % pillTexts.length;
      pillTextEl.textContent     = pillTexts[pillIdx];
      pillTextEl.style.opacity   = '1';
      pillTextEl.style.transform = 'translateY(0)';
    }, 300);
  }, 3200);

  // ── Strings ───────────────────────────────────────────────────────
  var WELCOME = 'Olá! Sou a **Mia**, consultora de IA da M2W. 🇧🇷\n*Hello! I\'m Mia, M2W\'s AI consultant.* 🇺🇸\n*¡Hola! Soy Mia, consultora de IA de M2W.* 🇪🇸\n\nPodemos conversar em **português**, **inglês** ou **espanhol** — você escolhe!\n\nMe conta: qual é o seu maior desafio hoje com conteúdo ou vendas?';
  var TAGS = [
    'Gasto muito com influencers',
    'Quero vender no TikTok Shop',
    'Não consigo escalar conteúdo',
    'Como funciona a IA?',
    'Ver preços',
    'Falar com Silvio'
  ];

  // ── Calendly Embed ────────────────────────────────────────────────
  var CALENDLY_URL = 'https://calendly.com/silviofilhosf/nova-reuniao';
  var calEmbedded  = false;

  function addCalendlyEmbed(){
    if(calEmbedded) return;
    calEmbedded = true;

    var wrap = document.createElement('div');
    wrap.className = 'msg msg-bot';
    wrap.style.cssText = 'background:none;border:none;padding:0;max-width:100%;width:100%;';

    var outer = document.createElement('div');
    outer.className = 'cal-embed-wrap';

    var lbl = document.createElement('span');
    lbl.className = 'cal-embed-label';
    lbl.textContent = 'Escolha um horário com Silvio';
    outer.appendChild(lbl);

    var inner = document.createElement('div');
    inner.className = 'cal-embed-inner';
    outer.appendChild(inner);
    wrap.appendChild(outer);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;

    function mountCal(){
      Calendly.initInlineWidget({
        url: CALENDLY_URL + '?hide_event_type_details=1&hide_gdpr_banner=1',
        parentElement: inner,
      });
      setTimeout(function(){ msgs.scrollTop = msgs.scrollHeight; }, 400);
    }

    if(window.Calendly){
      mountCal();
    } else {
      if(!document.querySelector('link[href*="calendly"]')){
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://assets.calendly.com/assets/external/widget.css';
        document.head.appendChild(link);
      }
      var s = document.createElement('script');
      s.src = 'https://assets.calendly.com/assets/external/widget.js';
      s.onload = mountCal;
      document.head.appendChild(s);
    }
  }

  // ── Markdown renderer ──────────────────────────────────────────
  function renderBot(text){
    var s = text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    s = s.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
    s = s.replace(/\*([^*\n]+)\*/g,'<em>$1</em>');
    // convert lines starting with - or • to ul/li
    s = s.replace(/((?:(?:^|\n)[-•] [^\n]+)+)/g, function(m){
      var items = m.trim().split(/\n/).map(function(l){
        return '<li>'+l.replace(/^[-•]\s*/,'')+'</li>';
      });
      return '<ul>'+items.join('')+'</ul>';
    });
    s = s.replace(/\n/g,'<br>');
    return s;
  }

  function addMsg(content, role){
    var d=document.createElement('div');
    d.className='msg msg-'+(role==='user'?'user':'bot');
    if(role==='user'){ d.textContent=content; }
    else             { d.innerHTML=renderBot(content); }
    msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight;
    return d;
  }

  function addImgMsg(src, role){
    var d=document.createElement('div');
    d.className='msg-img-wrap'+(role==='user'?' user-img':'');
    var img=document.createElement('img');
    img.src=src; img.className='chat-img-thumb';
    img.alt=role==='user'?'Imagem enviada':'Imagem';
    d.appendChild(img); msgs.appendChild(d);
    msgs.scrollTop=msgs.scrollHeight;
  }

  function showTyping(){
    var d=document.createElement('div');
    d.className='msg-typing'; d.id='m2w-typing';
    d.innerHTML='<div class="dot-pulse"></div><div class="dot-pulse"></div><div class="dot-pulse"></div>';
    msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight;
  }
  function removeTyping(){ var t=document.getElementById('m2w-typing'); if(t) t.remove(); }

  function addTags(){
    var row=document.createElement('div'); row.className='chat-tags';
    TAGS.forEach(function(label){
      var b=document.createElement('button'); b.className='chat-tag'; b.textContent=label;
      b.onclick=function(){
        row.remove();
        if(label==='Falar com Silvio'){ addCalendlyEmbed(); }
        else{ submitMsg(label); }
      };
      row.appendChild(b);
    });
    msgs.appendChild(row); msgs.scrollTop=msgs.scrollHeight;
  }

  // ── Image compress & attach ──────────────────────────────────
  function compressImage(file, cb){
    var reader=new FileReader();
    reader.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var MAX=900, w=img.width, h=img.height;
        if(w>MAX||h>MAX){
          if(w>h){h=Math.round(h*MAX/w);w=MAX;}
          else{w=Math.round(w*MAX/h);h=MAX;}
        }
        var canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        cb(canvas.toDataURL('image/jpeg',0.82),'image/jpeg');
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function clearPendingImg(){
    pendingImg=null; previewStrip.style.display='none';
    previewThumb.src=''; fileInput.value=''; updateSend();
  }

  function updateSend(){
    send.disabled = !input.value.trim() && !pendingImg;
  }

  attachBtn.addEventListener('click', function(){ fileInput.click(); });
  fileInput.addEventListener('change', function(){
    if(this.files&&this.files[0]){
      compressImage(this.files[0], function(dataUrl, mime){
        pendingImg={dataUrl:dataUrl, mimeType:mime};
        previewThumb.src=dataUrl;
        previewStrip.style.display='flex';
        updateSend();
      });
    }
  });
  previewRemove.addEventListener('click', clearPendingImg);

  // ── Open / Close ────────────────────────────────────────────────
  function setOpen(state){
    openState=state;
    box.style.display  = openState?'flex':'none';
    pill.style.display = openState?'none':'flex';
    pill.setAttribute('aria-expanded', String(openState));
    if(openState && history.length===0){
      addMsg(WELCOME,'bot');
      history.push({role:'assistant',content:WELCOME});
      setTimeout(addTags,280);
      setTimeout(function(){ input.focus(); },380);
    }
  }

  // ── Submit ─────────────────────────────────────────────────────────
  function submitMsg(text){
    var txt = (typeof text==='string' ? text : input.value).trim();
    if((!txt && !pendingImg) || sending) return;
    input.value=''; input.style.height='auto';
    sending=true; send.disabled=true;

    var userContent;
    if(pendingImg){
      var imgData=pendingImg;
      if(txt){
        userContent=[
          {type:'text',text:txt},
          {type:'image_url',image_url:{url:imgData.dataUrl}}
        ];
        addMsg(txt,'user');
      } else {
        userContent=[
          {type:'text',text:'Compartilhando uma imagem para sua análise.'},
          {type:'image_url',image_url:{url:imgData.dataUrl}}
        ];
      }
      addImgMsg(imgData.dataUrl,'user');
      clearPendingImg();
    } else {
      userContent=txt;
      addMsg(txt,'user');
    }

    history.push({role:'user',content:userContent});
    showTyping();

    fetch(WORKER,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:history})
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      removeTyping();
      var reply=data.reply||'Desculpe, tive um problema. Tente novamente.';
      addMsg(reply,'bot');
      history.push({role:'assistant',content:reply});

      if(data.leadCaptured){
        setTimeout(function(){
          var n=addMsg('✓ Informações registradas. Você receberá uma análise personalizada em menos de 24h.','bot');
          n.style.background='rgba(134,239,172,0.07)';
          n.style.borderColor='rgba(134,239,172,0.18)';
          n.style.color='#86efac';
        },500);
      }
      if(data.calendly){ setTimeout(addCalendlyEmbed,600); }
      sending=false; updateSend(); input.focus();
    })
    .catch(function(){
      removeTyping();
      addMsg('Problema de conexão. Tente novamente em instantes.','bot');
      sending=false; updateSend();
    });
  }

  // ── Event listeners ─────────────────────────────────────────────────
  pill.addEventListener('click',function(){ setOpen(true); });
  document.getElementById('m2w-chat-close').addEventListener('click',function(){ setOpen(false); });
  send.addEventListener('click',function(){ submitMsg(); });
  input.addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); submitMsg(); }
  });
  input.addEventListener('input',function(){
    this.style.height='auto';
    this.style.height=Math.min(this.scrollHeight,88)+'px';
    updateSend();
  });
})();
</script>
